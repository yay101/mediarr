{{define "layout"}}
<!DOCTYPE html>
<html lang="en" x-data="app()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} - Mediarr</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Basecoat UI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@hunvreus/basecoat@0.3.11/dist/basecoat.min.css">
    
    <!-- Alpine.js -->
    <script src="https://unpkg.com/alpinejs@3.14.8/cdn.min.js" defer></script>
    
    <!-- Mediarr App JS -->
    <script src="/static/js/app.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .toast { max-width: 400px; }
    </style>
</head>
<body class="h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    
    <!-- Toast Notifications -->
    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2" 
         x-data 
         x-show="$store.notifications.items.length > 0"
         x-cloak>
        <template x-for="notification in $store.notifications.items" :key="notification.id">
            <div class="card shadow-lg border-l-4"
                 :class="{
                     'border-green-500 bg-green-50 dark:bg-green-900': notification.level === 'success',
                     'border-red-500 bg-red-50 dark:bg-red-900': notification.level === 'error',
                     'border-yellow-500 bg-yellow-50 dark:bg-yellow-900': notification.level === 'warning',
                     'border-blue-500 bg-blue-50 dark:bg-blue-900': notification.level === 'info'
                 }">
                <div class="flex items-center justify-between gap-3 p-3">
                    <span x-text="notification.message"></span>
                    <button @click="$store.notifications.remove(notification.id)" 
                            class="text-current opacity-70 hover:opacity-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- Main Layout -->
    <div class="flex h-screen">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shrink-0">
            
            <!-- Logo -->
            <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                <a href="/" class="flex items-center gap-2">
                    <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
                    </svg>
                    <span class="text-xl font-bold">Mediarr</span>
                </a>
            </div>
            
            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="/" class="nav-item" :class="{ 'active': window.location.pathname === '/' }">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Dashboard
                </a>
                
                <a href="/movies" class="nav-item" :class="{ 'active': window.location.pathname === '/movies' }">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
                    </svg>
                    Movies
                </a>
                
                <a href="/tv" class="nav-item" :class="{ 'active': window.location.pathname === '/tv' }">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    TV Shows
                </a>
                
                <a href="/downloads" class="nav-item" :class="{ 'active': window.location.pathname === '/downloads' }">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Downloads
                </a>
                
                <a href="/search" class="nav-item" :class="{ 'active': window.location.pathname === '/search' }">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    Search
                </a>
                
                <a href="/rss" class="nav-item" :class="{ 'active': window.location.pathname === '/rss' }">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7M6 17a1 1 0 110-2 1 1 0 010 2z"/>
                    </svg>
                    RSS Feeds
                </a>
                
                <div class="pt-4 mt-4 border-t border-gray-200 dark:border-gray-700">
                    <a href="/settings" class="nav-item" :class="{ 'active': window.location.pathname === '/settings' }">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        Settings
                    </a>
                </div>
            </nav>
            
            <!-- User Menu -->
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <div x-show="$store.user.authenticated" class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900 flex items-center justify-center shrink-0">
                        <span class="text-sm font-medium text-indigo-600 dark:text-indigo-200" x-text="$store.user.username.charAt(0).toUpperCase()"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate" x-text="$store.user.username"></p>
                        <p class="text-xs opacity-70" x-text="$store.user.role"></p>
                    </div>
                    <button @click="$store.user.logout()" class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
                        <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </button>
                </div>
                <a x-show="!$store.user.authenticated" href="/login" class="btn btn-primary w-full justify-center">
                    Login
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-auto p-6">
            {{template "content" .}}
        </main>
    </div>
</body>
</html>
{{end}}
