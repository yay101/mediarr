{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mediarr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@hunvreus/basecoat@0.3.11/dist/basecoat.min.css">
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 420px;
        }
        .btn-oidc { 
            background: #4f46e5; 
            color: white; 
            display: block; 
            text-align: center; 
            padding: 0.875rem; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-oidc:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: #9ca3af;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 mb-4">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Mediarr</h1>
            <p class="text-gray-500 mt-1">Sign in to your account</p>
        </div>

        <!-- Debug info (remove in production) -->
        <div id="debug-info" class="mb-4 p-3 bg-gray-100 rounded-lg text-xs font-mono text-gray-600 hidden">
            <p><strong>Providers:</strong> <span id="provider-count">0</span></p>
            <p><strong>Auth Enabled:</strong> <span id="auth-enabled">?</span></p>
            <p id="debug-msg"></p>
        </div>

        <!-- OIDC Providers -->
        <div id="oidc-section">
            {{range .Providers}}
            <a href="/api/v1/auth/provider/{{.ID}}" class="btn-oidc">
                Sign in with {{.Name}}
            </a>
            {{else}}
            <p class="text-center text-gray-500 text-sm">No OIDC providers configured</p>
            {{end}}
        </div>

        <!-- Divider -->
        <div class="divider">or</div>

        <!-- Local Login Form -->
        <form onsubmit="handleLogin(event)">
            <div class="field mb-4">
                <label class="label" for="user">Username</label>
                <input type="text" id="user" class="input" placeholder="Enter username" required>
            </div>
            <div class="field mb-6">
                <label class="label" for="pass">Password</label>
                <input type="password" id="pass" class="input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-full justify-center">Sign In</button>
        </form>

        <!-- Error message -->
        <div id="error-msg" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm hidden"></div>
    </div>

    <script>
        // Debug mode - set to true to see debug info
        const DEBUG = true;

        function showDebug(msg) {
            if (DEBUG) {
                document.getElementById('debug-info').classList.remove('hidden');
                document.getElementById('debug-msg').textContent = msg;
            }
        }

        function showError(msg) {
            const errEl = document.getElementById('error-msg');
            errEl.textContent = msg;
            errEl.classList.remove('hidden');
        }

        // Check providers on load
        document.addEventListener('DOMContentLoaded', () => {
            const providers = {{len .Providers}};
            document.getElementById('provider-count').textContent = providers;
            showDebug('Page loaded, ' + providers + ' provider(s) found');
        });

        async function handleLogin(e) {
            e.preventDefault();
            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');

            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            showDebug('Attempting login for: ' + username);

            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                showDebug('Response: ' + res.status + ' - ' + JSON.stringify(data));

                if (data.success) {
                    showDebug('Login successful, redirecting...');
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showDebug('Fetch error: ' + err.message);
                showError('Connection error: ' + err.message);
            }
        }
    </script>
</body>
</html>
{{end}}
